<script>

let selectedPlatform = null;

                    <span class="button-text">Upgrade to Premium</span>

                <style>

                        border: none;
                        border-radius: 30px;

                        display: flex;
                        align-items: center;

function detectAndSetPlatform() {
    // Show loading state
    Swal.fire({
        title: 'Loading Platform Information',
        html: `
            <div style="margin: 20px 0;">
                <div class="loading-wave" style="display: flex; justify-content: center; gap: 5px; height: 30px;">
                    <div style="background: #6e8efb; height: 100%; width: 6px; animation: wave 1s ease-in-out infinite; animation-delay: 0.1s; border-radius: 3px;"></div>
                    <div style="background: #a777e3; height: 100%; width: 6px; animation: wave 1s ease-in-out infinite; animation-delay: 0.2s; border-radius: 3px;"></div>
                    <div style="background: #6e8efb; height: 100%; width: 6px; animation: wave 1s ease-in-out infinite; animation-delay: 0.3s; border-radius: 3px;"></div>
                    <div style="background: #a777e3; height: 100%; width: 6px; animation: wave 1s ease-in-out infinite; animation-delay: 0.4s; border-radius: 3px;"></div>
                </div>
                <style>
                    @keyframes wave {
                        0%, 60%, 100% { transform: scaleY(0.6); }
                        30% { transform: scaleY(1); }
                    }
                </style>
            </div>
            <p style="color: #666; margin-top: 15px;">Detecting your platform...</p>
        `,
        allowOutsideClick: false,
        showConfirmButton: false
    });

    // Get current domain
    const currentDomain = window.location.hostname;
    
    // Fetch platforms from API
    $.ajax({
        url: 'https://api.exoticnairobi.com/api/platforms',
        method: 'GET',
        success: function(response) {
            // Check if response is valid
            if (!response || !response.platforms || !Array.isArray(response.platforms)) {
                console.error('Invalid platforms API response format:', response);
                Swal.fire({
                    icon: 'error',
                    title: 'Data Error',
                    text: response?.message || 'Received invalid platforms data format from server',
                    confirmButtonColor: '#6e8efb',
                    background: '#ffffff',
                    backdrop: 'rgba(110, 142, 251, 0.1)'
                });
                return;
            }
            
            const platforms = response.platforms;
            
            // Check if platforms array is empty
            if (platforms.length === 0) {
                Swal.fire({
                    icon: 'info',
                    title: 'No platforms available',
                    text: response.message || 'Please contact support for assistance.',
                    confirmButtonColor: '#6e8efb',
                    background: '#ffffff',
                    backdrop: 'rgba(110, 142, 251, 0.1)'
                });
                return;
            }

            // Find platform that matches current domain
            const matchedPlatform = platforms.find(platform => {
                try {
                    const platformDomain = new URL(platform.domain).hostname;
                    return platformDomain === currentDomain;
                } catch (e) {
                    console.error('Error parsing platform domain:', platform.domain, e);
                    return false;
                }
            });

            if (!matchedPlatform) {
                Swal.fire({
                    icon: 'error',
                    title: 'Platform Not Found',
                    text: 'Could not identify your platform. Please contact support.',
                    confirmButtonColor: '#6e8efb',
                    background: '#ffffff',
                    backdrop: 'rgba(110, 142, 251, 0.1)'
                });
                return;
            }

            // Set the matched platform
            selectedPlatform = {
                id: matchedPlatform.id,
                name: matchedPlatform.name,
                product_id: matchedPlatform.product_id
            };

            Swal.close();
            showPackageSelection();
        },
        error: function(xhr) {
            Swal.fire({
                icon: 'error',
                title: 'Connection Error',
                text: xhr.responseJSON?.message || 'Could not load platform information. Please check your connection and try again.',
                confirmButtonColor: '#6e8efb',
                background: '#ffffff',
                backdrop: 'rgba(110, 142, 251, 0.1)'
            });
        }
    });
}

                    text: response?.message || 'Received invalid data format from server',

                    icon: 'info',
                    title: 'No packages available',

                    background: '#ffffff',

            }

            // Filter products to only show the one associated with the platform
            const platformProduct = products.find(p => p.id === selectedPlatform.product_id);
            
            if (!platformProduct) {

                    icon: 'error',
                    title: 'Package Not Found',
                    text: 'No premium package available for your platform. Please contact support.',
                    confirmButtonColor: '#6e8efb',
                    background: '#ffffff',
                    backdrop: 'rgba(110, 142, 251, 0.1)'

                    <div class="pricing-options">
                        <div class="pricing-option active" data-price="${platformProduct.monthly_price}" data-duration="monthly">
                            <div class="option-name">Monthly</div>
                            <div class="option-price">
                                <span class="currency">${platformProduct.currency}</span>
                                <span class="amount">${parseFloat(platformProduct.monthly_price).toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="pricing-option" data-price="${platformProduct.biweekly_price}" data-duration="biweekly">

                            <div class="option-price">

                        Select Plan

            `;

            Swal.fire({
                title: 'Premium Plan for ' + selectedPlatform.name,
                html: `
                    <div class="package-selection-header">
                        <div class="header-icon">🏆</div>
                        <h3>Unlock Exclusive Features</h3>
                        <p>Select your preferred billing option</p>
                    </div>
                    <div class="horizontal-scroll-container">
                        <div class="package-horizontal-container">
                            ${productOptions}
                        </div>
                    </div>
                    <style>
                        .package-selection-header {
                            text-align: center;
                            margin-bottom: 20px;
                        }
                        .package-selection-header .header-icon {
                            font-size: 40px;
                            margin-bottom: 10px;
                        }
                        .package-selection-header h3 {
                            margin: 5px 0;
                            color: #333;
                        }
                        .package-selection-header p {
                            color: #666;
                            margin: 0;
                        }
                        .horizontal-scroll-container {
                            width: 100%;
                            overflow-x: auto;
                            padding-bottom: 20px;
                            margin-top: 20px;
                        }
                        .package-horizontal-container {
                            display: inline-flex;
                            gap: 20px;
                            padding: 0 10px;
                        }
                        .package-card {
                            position: relative;
                            border: 1px solid #e0e0e0;
                            border-radius: 15px;
                            padding: 25px;
                            min-width: 280px;
                            transition: all 0.3s ease;
                            background: white;
                            overflow: hidden;
                            border-top: 3px solid #6e8efb;
                        }
                        .package-card:hover {
                            transform: translateY(-5px);
                            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
                            border-color: #a777e3;
                        }
                        .package-name {
                            font-size: 20px;
                            font-weight: bold;
                            margin-bottom: 15px;
                            color: #333;
                            text-align: center;
                        }
                        .pricing-options {
                            display: flex;
                            gap: 10px;
                            margin-bottom: 20px;
                            background: #f8f9ff;
                            padding: 10px;
                            border-radius: 10px;
                        }
                        .pricing-option {
                            flex: 1;
                            padding: 10px;
                            border-radius: 8px;
                            text-align: center;
                            cursor: pointer;
                            transition: all 0.3s ease;
                        }
                        .pricing-option.active {
                            background: white;
                            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                            border: 1px solid #a777e3;
                        }
                        .pricing-option:not(.active):hover {
                            background: rgba(255,255,255,0.7);
                        }
                        .option-name {
                            font-size: 14px;
                            font-weight: bold;
                            color: #666;
                            margin-bottom: 5px;
                        }
                        .pricing-option.active .option-name {
                            color: #6e8efb;
                        }
                        .option-price {
                            font-size: 18px;
                            font-weight: bold;
                            color: #333;
                            display: flex;
                            align-items: flex-start;
                            justify-content: center;
                            gap: 3px;
                        }
                        .pricing-option.active .option-price {
                            color: #a777e3;
                        }
                        .option-price .currency {
                            font-size: 12px;
                            margin-top: 3px;
                        }
                        .package-features {
                            font-size: 14px;
                            color: #666;
                            line-height: 1.6;
                            margin-bottom: 20px;
                        }
                        .feature-item {
                            display: flex;
                            align-items: flex-start;
                            margin-bottom: 10px;
                        }
                        .feature-icon {
                            color: #6e8efb;
                            margin-right: 8px;
                            font-weight: bold;
                        }
                        .select-package-btn {
                            background: linear-gradient(135deg, #6e8efb, #a777e3);
                            color: white;
                            border: none;
                            width: 100%;
                            padding: 12px;
                            border-radius: 30px;
                            font-weight: bold;

                            transition: all 0.3s ease;

                        }
                        .swal2-popup {
                            max-width: 900px !important;
                            border-radius: 15px !important;
                        }
                        .swal2-title {
                            color: #333;
                        }
                        /* Scrollbar styling */
                        .horizontal-scroll-container::-webkit-scrollbar {
                            height: 8px;
                        }
                        .horizontal-scroll-container::-webkit-scrollbar-track {
                            background: #f1f1f1;

                        }
                        .horizontal-scroll-container::-webkit-scrollbar-thumb {
                            background: #6e8efb;
                            border-radius: 10px;
                        }
                        .horizontal-scroll-container::-webkit-scrollbar-thumb:hover {
                            background: #5d7de8;
                        }
                    </style>
                `,
                showConfirmButton: false,
                showCloseButton: true,
                width: 'auto'

            // Add click handler for pricing options
            $('.pricing-option').click(function() {
                $(this).siblings().removeClass('active');

        error: function(xhr) {
            Swal.fire({

                }

                }

                    margin-bottom: 8px;

        `,
        showCancelButton: true,

        preConfirm: () => {
            const phone = document.getElementById('payment-phone').value;
            if (!phone || !/^[0-9]{9}$/.test(phone)) {

function initiateCardPayment(id, name, price, currency, duration) {
    const payload = {
        product_id: id,
        price: price,
        currency: currency,
        duration: duration,
        user_id: escortwp_user_id,
        platform_id: selectedPlatform.id
    };

    jQuery.ajax({
        url: 'https://api.exoticnairobi.com/api/cybersource/initiate-payment',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(payload),
        success: function (response) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://testsecureacceptance.cybersource.com/pay';

            for (const key in response) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = response[key];
                form.appendChild(input);
            }

            document.body.appendChild(form);
            form.submit();
        },
        error: function (xhr) {
            console.error('Failed to prepare CyberSource payment:', xhr.responseText);
            Swal.fire('Error', 'Unable to initiate payment. Please try again.', 'error');
        }
    });
}

function processPayment(id, name, price, currency, provider, phone, duration) {
    Swal.fire({
        title: 'Processing Payment',
        html: `
            <div class="processing-payment">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
                <p class="processing-text">Sending payment request to your ${provider === 'mpesa' ? 'MPESA' : 'Airtel Money'}...</p>
            </div>
            <style>
                .processing-payment {
                    text-align: center;
                }
                .loading-spinner {
                    margin: 20px auto;
                    width: 60px;
                    height: 60px;
                    position: relative;
                }
                .spinner {
                    width: 100%;
                    height: 100%;
                    border: 5px solid #f3f3f3;
                    border-top: 5px solid #6e8efb;
                    border-radius: 50%;
                    animation: spin 1s linear infinite;
                }
                @keyframes spin {
                    0% { transform: rotate(0deg); }
                    100% { transform: rotate(360deg); }
                }
                .processing-text {
                    color: #666;
                    margin-top: 15px;
                }
            </style>
        `,
        allowOutsideClick: false,
        showConfirmButton: false
    });
    
    // Prepare the payment data including platform_id
    const paymentData = {
        product_id: id,
        platform_id: selectedPlatform.id,
        phone: phone,
        user_id: escortwp_user_id,
        duration: duration,
        amount: price
    };

    // Make the AJAX request to initiate payment
    jQuery.ajax({
        url: 'https://api.exoticnairobi.com/api/initiate-payment',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(paymentData),
        success: function(response) {
            // Handle response based on your controller's return structure
            if (response.status === true) {
                Swal.fire({
                    title: 'Payment Request Sent!',
                    html: `
                        <div class="payment-success">
                            <div class="success-icon">📱</div>
                            <p>A payment request has been sent to your ${provider === 'mpesa' ? 'MPESA' : 'Airtel Money'} number.</p>
                            <p>Please complete the payment on your phone to activate your account on <strong>${selectedPlatform.name}</strong>.</p>
                            
                            <div class="manual-instructions">
                                <h4>If you don't receive the prompt:</h4>
                                <ol>
                                    <li>Go to your ${provider === 'mpesa' ? 'MPESA' : 'Airtel Money'} menu</li>
                                    <li>Select "Pay Bill"</li>
                                    <li>Enter Business Number <strong>68</strong></li>
                                    <li>Enter Account Number <strong>${phone}</strong></li>
                                    <li>Enter Amount <strong>${price}</strong></li>
                                </ol>
                            </div>
                        </div>
                        <style>
                            .payment-success {
                                text-align: center;
                            }
                            .success-icon {
                                font-size: 50px;
                                margin-bottom: 15px;
                            }
                            .manual-instructions {
                                background: #f8f9ff;
                                padding: 15px;
                                border-radius: 10px;
                                margin-top: 20px;
                                text-align: left;
                            }
                            .manual-instructions h4 {
                                margin-top: 0;
                                color: #333;
                            }
                            .manual-instructions ol {
                                padding-left: 20px;
                                margin-bottom: 0;
                            }
                            .manual-instructions li {
                                margin-bottom: 8px;
                            }
                        </style>
                    `,
                    icon: 'success',
                    confirmButtonColor: '#6e8efb'
                });
            } else {
                // Handle error cases from your API
                const errorMsg = response.error || 
                                response.message || 
                                'Payment initiation failed. Please try again.';
                
                Swal.fire({
                    title: 'Payment Failed',
                    text: errorMsg,
                    icon: 'error',
                    confirmButtonColor: '#6e8efb'
                });
            }
        },
        error: function(xhr) {
            // Handle AJAX errors
            let errorMessage = 'Payment initiation failed. Please try again.';
            
            try {
                const response = xhr.responseJSON;
                errorMessage = response.error || 
                              response.message || 
                              errorMessage;
            } catch (e) {
                console.error('Error parsing error response:', e);
            }
            
            Swal.fire({
                title: 'Error',
                text: errorMessage,
                icon: 'error',
                confirmButtonColor: '#6e8efb'
            });
        }
    });
}
